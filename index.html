<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menghubungkan ke Edpuzzle...</title>

<script>
// ===============================
// GANTI HANYA DUA LINK DI BAWAH INI
// ===============================
const LINK_1 = "https://edpuzzle.com/signup/teacher?rc=36q0c8";
const LINK_2 = "https://example.com"; // Ganti jika sudah punya link kedua
// ===============================

// Tanggal acuan (bebas, jangan diubah lagi)
const TANGGAL_ACUAN = new Date(2026, 0, 1); // 1 Januari 2026

const hariIni = new Date();

// Hilangkan jam agar tidak terpengaruh waktu
TANGGAL_ACUAN.setHours(0,0,0,0);
hariIni.setHours(0,0,0,0);

// Hitung selisih hari
const selisihHari = Math.floor(
    (hariIni - TANGGAL_ACUAN) / (1000 * 60 * 60 * 24)
);

// Genap = Link 1
// Ganjil = Link 2
const tujuan = (selisihHari % 2 === 0) ? LINK_1 : LINK_2;

// Redirect
window.location.replace(tujuan);

</script>
