<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Redirect Edpuzzle</title>

    <script>
        const link1 = "https://edpuzzle.com/signup/teacher?rc=36q0c8";
        const link2 = "https://example.com"; // Nanti ganti dengan link Edpuzzle kedua

        // Menghitung jumlah hari sejak 1 Januari 2026
        const mulai = new Date("2026-01-01");
        const hariIni = new Date();

        const selisihHari = Math.floor(
            (hariIni - mulai) / (1000 * 60 * 60 * 24)
        );

        if (selisihHari % 2 === 0) {
            window.location.replace(link1);
        } else {
            window.location.replace(link2);
        }
    </script>
</head>
<body>
    <h2>Sedang menghubungkan ke Edpuzzle...</h2>
</body>
</html>
